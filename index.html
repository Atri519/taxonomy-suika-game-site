<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>종속과목강문계 수박게임</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #293047;
      --muted: #6c7890;
      --line: #f1c8d9;
      --paper: #fff7fb;
      --panel: #ffffff;
      --accent: #ff7aa8;
      --button: #ff7aa8;
      --button-hover: #f05f94;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: linear-gradient(180deg, #fff7fb 0%, #f1fbff 52%, #fffaf0 100%);
      color: var(--ink);
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .app {
      width: min(100%, 760px);
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      min-height: 58px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgb(255 255 255 / 88%);
      box-shadow: 0 10px 24px rgb(255 122 168 / 14%);
    }

    h1 {
      margin: 0;
      font-size: 23px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.25;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button {
      width: 40px;
      height: 40px;
      border: 0;
      border-radius: 8px;
      background: var(--button);
      color: #ffffff;
      font: 700 23px/1 system-ui, sans-serif;
      cursor: pointer;
      box-shadow: 0 6px 0 #d84d7b;
    }

    button:hover {
      background: var(--button-hover);
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 4px 0 #d84d7b;
    }

    .stage {
      width: 100%;
      display: grid;
      justify-items: center;
    }

    canvas {
      width: min(100%, 560px);
      height: auto;
      display: block;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 18px 34px rgb(255 122 168 / 18%);
      touch-action: none;
      user-select: none;
    }

    @media (max-width: 560px) {
      body {
        padding: 10px;
      }

      .topbar {
        grid-template-columns: 1fr auto;
      }

      h1 {
        font-size: 19px;
      }

      button {
        width: 38px;
        height: 38px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <div>
        <h1>종속과목강문계 수박게임</h1>
        <div class="subtitle">종 → 속 → 과 → 목 → 강 → 문 → 계</div>
      </div>
      <div class="actions">
        <button id="restartButton" type="button" title="재시작" aria-label="재시작">↻</button>
      </div>
    </div>
    <div class="stage">
      <canvas id="gameCanvas" width="560" height="760" aria-label="종속과목강문계 수박게임"></canvas>
    </div>
  </main>

  <script>
    (() => {
      "use strict";

      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const restartButton = document.getElementById("restartButton");

      const WIDTH = 560;
      const HEIGHT = 760;
      const BOARD_LEFT = 70;
      const BOARD_TOP = 86;
      const BOARD_WIDTH = 420;
      const BOARD_HEIGHT = 600;
      const BOARD_RIGHT = BOARD_LEFT + BOARD_WIDTH;
      const BOARD_BOTTOM = BOARD_TOP + BOARD_HEIGHT;
      const DANGER_LINE = BOARD_TOP + 82;
      const DROP_Y = BOARD_TOP + 34;
      const FIXED_STEP = 1 / 120;
      const MAX_FRAME_SECONDS = 0.055;
      const MAX_ACCUMULATED_SECONDS = 0.11;
      const GRAVITY = 1480;
      const WALL_RESTITUTION = 0.12;
      const FLOOR_RESTITUTION = 0.06;
      const AIR_DAMPING = 0.9985;
      const GROUND_FRICTION = 0.988;
      const COLLISION_RESTITUTION = 0.08;
      const TANGENTIAL_FRICTION = 0.14;
      const POSITION_CORRECTION = 0.86;
      const POSITION_SLOP = 0.015;
      const SETTLE_SPEED = 9;
      const COLLISION_PASSES = 7;
      const DROP_COOLDOWN = 430;
      const GAME_OVER_SECONDS = 1.35;

      const LEVELS = [
        { label: "종", radius: 18, fill: "#ffe07a", outline: "#bf7b00", score: 2 },
        { label: "속", radius: 24, fill: "#ff9fb2", outline: "#bd3f68", score: 5 },
        { label: "과", radius: 31, fill: "#98e8ae", outline: "#2f8a49", score: 11 },
        { label: "목", radius: 39, fill: "#7bd8f7", outline: "#2380a0", score: 23 },
        { label: "강", radius: 50, fill: "#9bb8ff", outline: "#4563b6", score: 47 },
        { label: "문", radius: 63, fill: "#c9a6ff", outline: "#704aad", score: 95 },
        { label: "계", radius: 79, fill: "#ff90c5", outline: "#b63870", score: 191 }
      ];

      const state = {
        balls: [],
        nextId: 1,
        score: 0,
        best: readBestScore(),
        currentLevel: 0,
        nextLevel: 0,
        aimX: (BOARD_LEFT + BOARD_RIGHT) / 2,
        nextDropAt: 0,
        dangerTime: 0,
        gameOver: false,
        accumulator: 0,
        lastTime: performance.now()
      };

      const fontStack = '"Malgun Gothic", "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif';

      function setupCanvas() {
        const ratio = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
        canvas.width = Math.round(WIDTH * ratio);
        canvas.height = Math.round(HEIGHT * ratio);
        ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
        canvas.dataset.ratio = String(ratio);
      }

      function readBestScore() {
        try {
          return Number(localStorage.getItem("taxonomySuikaBest") || 0);
        } catch {
          return 0;
        }
      }

      function saveBestScore(value) {
        try {
          localStorage.setItem("taxonomySuikaBest", String(value));
        } catch {
          return;
        }
      }

      function randomDropLevel() {
        return Math.floor(Math.random() * 4);
      }

      function resetGame() {
        state.balls = [];
        state.nextId = 1;
        state.score = 0;
        state.currentLevel = randomDropLevel();
        state.nextLevel = randomDropLevel();
        state.aimX = (BOARD_LEFT + BOARD_RIGHT) / 2;
        state.nextDropAt = 0;
        state.dangerTime = 0;
        state.gameOver = false;
        state.accumulator = 0;
        state.lastTime = performance.now();
      }

      function clampAim() {
        const radius = LEVELS[state.currentLevel].radius;
        state.aimX = Math.max(BOARD_LEFT + radius, Math.min(BOARD_RIGHT - radius, state.aimX));
      }

      function pointerToCanvasX(event) {
        const rect = canvas.getBoundingClientRect();
        return ((event.clientX - rect.left) / rect.width) * WIDTH;
      }

      function dropCurrent(now = performance.now()) {
        if (state.gameOver) {
          resetGame();
          return;
        }
        if (now < state.nextDropAt) {
          return;
        }

        clampAim();
        state.balls.push({
          id: state.nextId++,
          level: state.currentLevel,
          x: state.aimX,
          y: DROP_Y,
          vx: 0,
          vy: 42,
          createdAt: now
        });
        state.currentLevel = state.nextLevel;
        state.nextLevel = randomDropLevel();
        state.nextDropAt = now + DROP_COOLDOWN;
      }

      function radiusOf(ball) {
        return LEVELS[ball.level].radius;
      }

      function massOf(ball) {
        const radius = radiusOf(ball);
        return Math.max(1, radius * radius);
      }

      function keepInsideBoard(ball) {
        const radius = radiusOf(ball);
        if (ball.x - radius < BOARD_LEFT) {
          ball.x = BOARD_LEFT + radius;
          if (ball.vx < 0) {
            ball.vx = -ball.vx * WALL_RESTITUTION;
          }
          ball.vy *= GROUND_FRICTION;
        }

        if (ball.x + radius > BOARD_RIGHT) {
          ball.x = BOARD_RIGHT - radius;
          if (ball.vx > 0) {
            ball.vx = -ball.vx * WALL_RESTITUTION;
          }
          ball.vy *= GROUND_FRICTION;
        }

        if (ball.y + radius > BOARD_BOTTOM) {
          ball.y = BOARD_BOTTOM - radius;
          if (ball.vy > 0) {
            ball.vy = -ball.vy * FLOOR_RESTITUTION;
          }
          if (Math.abs(ball.vy) < 32) {
            ball.vy = 0;
          }
          ball.vx *= GROUND_FRICTION;
        }
      }

      function mergeTouching(now) {
        const removed = new Set();
        const additions = [];

        for (let i = 0; i < state.balls.length; i += 1) {
          const first = state.balls[i];
          if (removed.has(first.id) || first.level >= LEVELS.length - 1) {
            continue;
          }

          for (let j = i + 1; j < state.balls.length; j += 1) {
            const second = state.balls[j];
            if (removed.has(second.id) || first.level !== second.level) {
              continue;
            }

            const dx = second.x - first.x;
            const dy = second.y - first.y;
            const minDistance = radiusOf(first) + radiusOf(second);
            if ((dx * dx) + (dy * dy) > (minDistance + 1) * (minDistance + 1)) {
              continue;
            }

            const firstMass = massOf(first);
            const secondMass = massOf(second);
            const newLevel = first.level + 1;
            additions.push({
              id: state.nextId++,
              level: newLevel,
              x: ((first.x * firstMass) + (second.x * secondMass)) / (firstMass + secondMass),
              y: ((first.y * firstMass) + (second.y * secondMass)) / (firstMass + secondMass),
              vx: ((first.vx * firstMass) + (second.vx * secondMass)) / (firstMass + secondMass) * 0.42,
              vy: ((first.vy * firstMass) + (second.vy * secondMass)) / (firstMass + secondMass) * 0.42,
              createdAt: now
            });
            removed.add(first.id);
            removed.add(second.id);
            state.score += LEVELS[newLevel].score;
            break;
          }
        }

        if (additions.length === 0) {
          return false;
        }

        state.balls = state.balls.filter((ball) => !removed.has(ball.id));
        state.balls.push(...additions);
        for (const ball of state.balls) {
          keepInsideBoard(ball);
        }
        return true;
      }

      function resolveCollisions() {
        for (let i = 0; i < state.balls.length; i += 1) {
          const first = state.balls[i];
          for (let j = i + 1; j < state.balls.length; j += 1) {
            const second = state.balls[j];
            const dx = second.x - first.x;
            const dy = second.y - first.y;
            const minDistance = radiusOf(first) + radiusOf(second);
            const distanceSq = (dx * dx) + (dy * dy);

            if (distanceSq >= minDistance * minDistance) {
              continue;
            }

            let distance;
            let nx;
            let ny;
            if (distanceSq <= 0.0001) {
              const angle = Math.random() * Math.PI * 2;
              nx = Math.cos(angle);
              ny = Math.sin(angle);
              distance = 0.01;
            } else {
              distance = Math.sqrt(distanceSq);
              nx = dx / distance;
              ny = dy / distance;
            }

            const overlap = minDistance - distance;
            const invFirst = 1 / massOf(first);
            const invSecond = 1 / massOf(second);
            const invSum = invFirst + invSecond;
            const correction = (Math.max(overlap - POSITION_SLOP, 0) / invSum) * POSITION_CORRECTION;

            first.x -= nx * correction * invFirst;
            first.y -= ny * correction * invFirst;
            second.x += nx * correction * invSecond;
            second.y += ny * correction * invSecond;

            const relativeVx = second.vx - first.vx;
            const relativeVy = second.vy - first.vy;
            const speedAlongNormal = (relativeVx * nx) + (relativeVy * ny);
            if (speedAlongNormal > 0) {
              continue;
            }

            const impulse = (-(1 + COLLISION_RESTITUTION) * speedAlongNormal) / invSum;
            const impulseX = impulse * nx;
            const impulseY = impulse * ny;
            first.vx -= impulseX * invFirst;
            first.vy -= impulseY * invFirst;
            second.vx += impulseX * invSecond;
            second.vy += impulseY * invSecond;

            let tangentX = relativeVx - (speedAlongNormal * nx);
            let tangentY = relativeVy - (speedAlongNormal * ny);
            const tangentLength = Math.hypot(tangentX, tangentY);
            if (tangentLength > 0.0001) {
              tangentX /= tangentLength;
              tangentY /= tangentLength;
              let frictionImpulse = -((relativeVx * tangentX) + (relativeVy * tangentY)) / invSum;
              const maxFriction = Math.abs(impulse) * TANGENTIAL_FRICTION;
              frictionImpulse = Math.max(-maxFriction, Math.min(maxFriction, frictionImpulse));
              first.vx -= frictionImpulse * tangentX * invFirst;
              first.vy -= frictionImpulse * tangentY * invFirst;
              second.vx += frictionImpulse * tangentX * invSecond;
              second.vy += frictionImpulse * tangentY * invSecond;
            }
          }
        }
      }

      function isOverLine(now) {
        return state.balls.some((ball) => {
          return now - ball.createdAt > 1150 && ball.y - radiusOf(ball) < DANGER_LINE;
        });
      }

      function settleBall(ball) {
        const onFloor = ball.y + radiusOf(ball) >= BOARD_BOTTOM - 0.5;
        if (!onFloor) {
          return;
        }
        if (Math.abs(ball.vy) < SETTLE_SPEED) {
          ball.vy = 0;
        }
        if (Math.abs(ball.vx) < SETTLE_SPEED) {
          ball.vx = 0;
        }
      }

      function simulate(step, now) {
        for (const ball of state.balls) {
          ball.vy += GRAVITY * step;
          ball.x += ball.vx * step;
          ball.y += ball.vy * step;
          const damping = Math.pow(AIR_DAMPING, step * 60);
          ball.vx *= damping;
          ball.vy *= damping;
          keepInsideBoard(ball);
        }

        for (let pass = 0; pass < COLLISION_PASSES; pass += 1) {
          if (mergeTouching(now)) {
            continue;
          }
          resolveCollisions();
          for (const ball of state.balls) {
            keepInsideBoard(ball);
          }
        }

        for (const ball of state.balls) {
          if (ball.y + radiusOf(ball) >= BOARD_BOTTOM - 0.5) {
            ball.vx *= GROUND_FRICTION;
          }
          settleBall(ball);
        }

        if (isOverLine(now)) {
          state.dangerTime += step;
        } else {
          state.dangerTime = Math.max(0, state.dangerTime - (step * 2));
        }

        if (state.dangerTime >= GAME_OVER_SECONDS) {
          state.gameOver = true;
          state.best = Math.max(state.best, state.score);
          saveBestScore(state.best);
        }
      }

      function roundedRect(x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
      }

      function drawBall(x, y, level, options = {}) {
        const data = LEVELS[level];
        const scale = options.scale || 1;
        const radius = data.radius * scale;
        const fill = options.preview ? "#fff1f7" : data.fill;

        const gradient = ctx.createRadialGradient(
          x - radius * 0.35,
          y - radius * 0.40,
          radius * 0.10,
          x,
          y,
          radius
        );
        gradient.addColorStop(0, "#ffffff");
        gradient.addColorStop(0.18, fill);
        gradient.addColorStop(1, shadeColor(fill, -12));

        ctx.save();
        if (options.preview) {
          ctx.globalAlpha = 0.70;
        }
        ctx.fillStyle = gradient;
        ctx.strokeStyle = data.outline;
        ctx.lineWidth = Math.max(1, 3 * scale);
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "#293047";
        ctx.font = `700 ${Math.max(11, radius * 0.68)}px ${fontStack}`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(data.label, x, y + radius * 0.03);
        ctx.restore();
      }

      function shadeColor(hex, amount) {
        const value = hex.replace("#", "");
        const number = parseInt(value, 16);
        const r = Math.max(0, Math.min(255, (number >> 16) + amount));
        const g = Math.max(0, Math.min(255, ((number >> 8) & 0x00ff) + amount));
        const b = Math.max(0, Math.min(255, (number & 0x0000ff) + amount));
        return `rgb(${r}, ${g}, ${b})`;
      }

      function drawBackground() {
        ctx.clearRect(0, 0, WIDTH, HEIGHT);
        ctx.fillStyle = "#fff7fb";
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = "#fffdf7";
        roundedRect(14, 12, WIDTH - 28, HEIGHT - 24, 8);
        ctx.fill();

        ctx.fillStyle = "#293047";
        ctx.font = `800 20px ${fontStack}`;
        ctx.textAlign = "left";
        ctx.textBaseline = "middle";
        ctx.fillText("종속과목강문계", BOARD_LEFT, 31);

        ctx.fillStyle = "#7a879e";
        ctx.font = `700 11px ${fontStack}`;
        ctx.fillText("종 → 속 → 과 → 목 → 강 → 문 → 계", BOARD_LEFT, 54);

        ctx.fillStyle = "#293047";
        ctx.font = `700 18px ${fontStack}`;
        ctx.textAlign = "right";
        ctx.fillText(`점수 ${state.score}`, BOARD_RIGHT, 27);

        ctx.fillStyle = "#7a879e";
        ctx.font = `700 13px ${fontStack}`;
        ctx.fillText(`최고 ${Math.max(state.best, state.score)}`, BOARD_RIGHT, 52);

        ctx.fillStyle = "#fffefe";
        ctx.strokeStyle = "#f0b8cd";
        ctx.lineWidth = 3;
        roundedRect(BOARD_LEFT, BOARD_TOP, BOARD_WIDTH, BOARD_HEIGHT, 7);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "#8fd3e8";
        roundedRect(BOARD_LEFT - 8, BOARD_BOTTOM, BOARD_WIDTH + 16, 9, 4);
        ctx.fill();

        ctx.save();
        ctx.strokeStyle = state.dangerTime > 0 ? "#ff4f7d" : "#ff9fbd";
        ctx.lineWidth = 2;
        ctx.setLineDash([8, 8]);
        ctx.beginPath();
        ctx.moveTo(BOARD_LEFT + 8, DANGER_LINE);
        ctx.lineTo(BOARD_RIGHT - 8, DANGER_LINE);
        ctx.stroke();
        ctx.restore();
      }

      function drawPreview() {
        if (state.gameOver) {
          return;
        }

        clampAim();
        ctx.save();
        ctx.strokeStyle = "#f6b5cf";
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 8]);
        ctx.beginPath();
        ctx.moveTo(state.aimX, DROP_Y + 6);
        ctx.lineTo(state.aimX, BOARD_BOTTOM - 5);
        ctx.stroke();
        ctx.restore();

        drawBall(state.aimX, DROP_Y, state.currentLevel, { preview: true });
      }

      function drawSideHud() {
        ctx.fillStyle = "#7a879e";
        ctx.font = `700 12px ${fontStack}`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("다음", 35, 112);
        drawBall(35, 152, state.nextLevel, { scale: 0.72 });
      }

      function drawEvolution() {
        const startX = BOARD_LEFT + 12;
        const y = 722;
        let x = startX;
        for (let i = 0; i < LEVELS.length; i += 1) {
          drawBall(x, y, i, { scale: 0.46 });
          if (i < LEVELS.length - 1) {
            ctx.fillStyle = "#a7b1c4";
            ctx.font = `700 13px ${fontStack}`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("›", x + 31, y);
          }
          x += 58;
        }
      }

      function drawGameOver() {
        ctx.save();
        ctx.fillStyle = "rgba(41, 48, 71, 0.84)";
        roundedRect(BOARD_LEFT + 42, 286, BOARD_WIDTH - 84, 166, 8);
        ctx.fill();

        ctx.fillStyle = "#ffffff";
        ctx.font = `700 29px ${fontStack}`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("게임 종료", WIDTH / 2, 336);

        ctx.fillStyle = "#e8edf5";
        ctx.font = `700 17px ${fontStack}`;
        ctx.fillText(`점수 ${state.score}`, WIDTH / 2, 377);

        ctx.fillStyle = "#afbbcc";
        ctx.font = `700 18px system-ui, sans-serif`;
        ctx.fillText("↻", WIDTH / 2, 414);
        ctx.restore();
      }

      function draw() {
        drawBackground();
        drawPreview();

        const ballsBySize = [...state.balls].sort((a, b) => radiusOf(a) - radiusOf(b));
        for (const ball of ballsBySize) {
          drawBall(ball.x, ball.y, ball.level);
        }

        drawSideHud();
        drawEvolution();

        if (state.gameOver) {
          drawGameOver();
        }
      }

      function frame(now) {
        const deltaSeconds = Math.min(MAX_FRAME_SECONDS, (now - state.lastTime) / 1000);
        state.lastTime = now;
        if (!state.gameOver) {
          state.accumulator = Math.min(MAX_ACCUMULATED_SECONDS, state.accumulator + deltaSeconds);
          while (state.accumulator >= FIXED_STEP) {
            simulate(FIXED_STEP, now);
            state.accumulator -= FIXED_STEP;
          }
        } else {
          state.accumulator = 0;
        }
        draw();
        requestAnimationFrame(frame);
      }

      canvas.addEventListener("pointermove", (event) => {
        state.aimX = pointerToCanvasX(event);
        clampAim();
      });

      canvas.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        state.aimX = pointerToCanvasX(event);
        clampAim();
        dropCurrent();
      });

      window.addEventListener("keydown", (event) => {
        if (event.key === "ArrowLeft" || event.key === "ArrowRight" || event.key === " ") {
          event.preventDefault();
        }

        if (event.key === "ArrowLeft") {
          state.aimX -= 23;
          clampAim();
        } else if (event.key === "ArrowRight") {
          state.aimX += 23;
          clampAim();
        } else if (event.key === " " || event.key === "Enter") {
          dropCurrent();
        } else if (event.key.toLowerCase() === "r") {
          resetGame();
        }
      });

      restartButton.addEventListener("click", resetGame);
      window.addEventListener("resize", () => {
        setupCanvas();
        draw();
      });

      setupCanvas();
      resetGame();
      requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>
